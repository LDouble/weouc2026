name: weouc-api-server

services:
  mysql:
    image: mysql:8.4
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_DATABASE: ${MYSQL_DB:-weouc}
      MYSQL_USER: ${MYSQL_USER:-weouc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-weouc}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  mongo:
    image: mongo:8
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-weouc}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' mongodb://127.0.0.1:27017/admin | grep -q 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api-server:
    build:
      context: ../../../services/api-server
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      API_SERVER_ENV: docker
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8080
      API_SERVER_VERSION: ${API_SERVER_VERSION:-dev-docker}
      API_SERVER_AUTH_ACCESS_TOKEN_TTL: ${API_SERVER_AUTH_ACCESS_TOKEN_TTL:-24h}
      API_SERVER_IAM_BACKEND: ${API_SERVER_IAM_BACKEND:-mysql_redis}
      API_SERVER_CAMPUS_LIFE_BACKEND: ${API_SERVER_CAMPUS_LIFE_BACKEND:-mongo}
      API_SERVER_PORTAL_BACKEND: ${API_SERVER_PORTAL_BACKEND:-mongo}
      API_SERVER_NOTIFICATION_BACKEND: ${API_SERVER_NOTIFICATION_BACKEND:-mongo}
      API_SERVER_ANALYTICS_BACKEND: ${API_SERVER_ANALYTICS_BACKEND:-mongo}
      API_SERVER_AUTO_MIGRATE: ${API_SERVER_AUTO_MIGRATE:-true}
      API_SERVER_MYSQL_ENABLED: "true"
      API_SERVER_MYSQL_HOST: mysql
      API_SERVER_MYSQL_PORT: 3306
      API_SERVER_MYSQL_DATABASE: ${MYSQL_DB:-weouc}
      API_SERVER_MYSQL_USER: ${MYSQL_USER:-weouc}
      API_SERVER_MYSQL_PASSWORD: ${MYSQL_PASSWORD:-weouc}
      API_SERVER_MYSQL_PARAMS: charset=utf8mb4&parseTime=True&loc=Local
      API_SERVER_MYSQL_HEALTHCHECK_TIMEOUT: ${API_SERVER_MYSQL_HEALTHCHECK_TIMEOUT:-2s}
      API_SERVER_MONGO_ENABLED: "true"
      API_SERVER_MONGO_URI: mongodb://mongo:27017/?directConnection=true
      API_SERVER_MONGO_DATABASE: ${MONGO_DB:-weouc}
      API_SERVER_MONGO_HEALTHCHECK_TIMEOUT: ${API_SERVER_MONGO_HEALTHCHECK_TIMEOUT:-2s}
      API_SERVER_REDIS_ENABLED: "true"
      API_SERVER_REDIS_HOST: redis
      API_SERVER_REDIS_PORT: 6379
      API_SERVER_REDIS_DB: ${API_SERVER_REDIS_DB:-0}
      API_SERVER_REDIS_PASSWORD: ${API_SERVER_REDIS_PASSWORD:-}
      API_SERVER_REDIS_HEALTHCHECK_TIMEOUT: ${API_SERVER_REDIS_HEALTHCHECK_TIMEOUT:-2s}
      API_SERVER_COS_ENABLED: ${API_SERVER_COS_ENABLED:-false}
      API_SERVER_COS_SECRET_ID: ${API_SERVER_COS_SECRET_ID:-}
      API_SERVER_COS_SECRET_KEY: ${API_SERVER_COS_SECRET_KEY:-}
      API_SERVER_COS_BUCKET: ${API_SERVER_COS_BUCKET:-}
      API_SERVER_COS_REGION: ${API_SERVER_COS_REGION:-}
      API_SERVER_COS_PATH_PREFIX: ${API_SERVER_COS_PATH_PREFIX:-miniapp}
      API_SERVER_COS_STS_DURATION: ${API_SERVER_COS_STS_DURATION:-1h}
      API_SERVER_COS_PRESIGNED_GET_TTL: ${API_SERVER_COS_PRESIGNED_GET_TTL:-6h}
      API_SERVER_COS_HEALTHCHECK_TIMEOUT: ${API_SERVER_COS_HEALTHCHECK_TIMEOUT:-2s}
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz | grep -q '\"status\":\"ready\"'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql-data:
  mongo-data:
  redis-data:
