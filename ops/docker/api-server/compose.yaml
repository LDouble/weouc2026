name: weouc-api-server

services:
  postgres:
    image: postgres:17-alpine
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB:-weouc}
      POSTGRES_USER: ${POSTGRES_USER:-weouc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weouc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api-server:
    build:
      context: ../../../services/api-server
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      API_SERVER_ENV: docker
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8080
      API_SERVER_VERSION: ${API_SERVER_VERSION:-dev-docker}
      API_SERVER_AUTH_ACCESS_TOKEN_TTL: ${API_SERVER_AUTH_ACCESS_TOKEN_TTL:-24h}
      API_SERVER_IAM_BACKEND: ${API_SERVER_IAM_BACKEND:-postgres_redis}
      API_SERVER_CAMPUS_LIFE_BACKEND: ${API_SERVER_CAMPUS_LIFE_BACKEND:-postgres}
      API_SERVER_AUTO_MIGRATE: ${API_SERVER_AUTO_MIGRATE:-true}
      API_SERVER_POSTGRES_ENABLED: "true"
      API_SERVER_POSTGRES_HOST: postgres
      API_SERVER_POSTGRES_PORT: 5432
      API_SERVER_POSTGRES_DATABASE: ${POSTGRES_DB:-weouc}
      API_SERVER_POSTGRES_USER: ${POSTGRES_USER:-weouc}
      API_SERVER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weouc}
      API_SERVER_POSTGRES_SSL_MODE: disable
      API_SERVER_POSTGRES_HEALTHCHECK_TIMEOUT: ${API_SERVER_POSTGRES_HEALTHCHECK_TIMEOUT:-2s}
      API_SERVER_REDIS_ENABLED: "true"
      API_SERVER_REDIS_HOST: redis
      API_SERVER_REDIS_PORT: 6379
      API_SERVER_REDIS_DB: ${API_SERVER_REDIS_DB:-0}
      API_SERVER_REDIS_PASSWORD: ${API_SERVER_REDIS_PASSWORD:-}
      API_SERVER_REDIS_HEALTHCHECK_TIMEOUT: ${API_SERVER_REDIS_HEALTHCHECK_TIMEOUT:-2s}
      API_SERVER_COS_ENABLED: ${API_SERVER_COS_ENABLED:-false}
      API_SERVER_COS_SECRET_ID: ${API_SERVER_COS_SECRET_ID:-}
      API_SERVER_COS_SECRET_KEY: ${API_SERVER_COS_SECRET_KEY:-}
      API_SERVER_COS_BUCKET: ${API_SERVER_COS_BUCKET:-}
      API_SERVER_COS_REGION: ${API_SERVER_COS_REGION:-}
      API_SERVER_COS_PATH_PREFIX: ${API_SERVER_COS_PATH_PREFIX:-miniapp}
      API_SERVER_COS_STS_DURATION: ${API_SERVER_COS_STS_DURATION:-1h}
      API_SERVER_COS_PRESIGNED_GET_TTL: ${API_SERVER_COS_PRESIGNED_GET_TTL:-6h}
      API_SERVER_COS_HEALTHCHECK_TIMEOUT: ${API_SERVER_COS_HEALTHCHECK_TIMEOUT:-2s}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz | grep -q '\"status\":\"ready\"'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
