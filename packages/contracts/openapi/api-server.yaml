openapi: 3.1.0
info:
  title: WEOUC API Server Baseline
  version: 0.2.6
  description: 校园综合应用后端当前可联调接口契约，覆盖系统接口、身份绑定、教务查询、门户、通知、分析审计、微信小程序主链路与校园生活闭环基础能力。
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: System
    description: 系统级健康检查、就绪检查与会话画像接口
  - name: IAM
    description: 登录、会话、资料与教务绑定接口
  - name: Academic
    description: 已绑定学生的学期、课程表、考试与成绩查询接口
  - name: Portal
    description: 首页门户、轮播与公告接口
  - name: Notification
    description: 站内通知收件箱与管理发布接口
  - name: Analytics
    description: 审计日志与基础运营看板接口
  - name: FileCenter
    description: 文件上传临时凭证与对象下载签名接口
  - name: CampusLife
    description: 首页动态、二手、跑腿、资料、失物招领、拼车、组局与审核接口
paths:
  /healthz:
    get:
      tags: [System]
      summary: 存活检查
      operationId: getHealthz
      responses:
        '200':
          description: 服务存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponseEnvelope'
  /readyz:
    get:
      tags: [System]
      summary: 就绪检查
      operationId: getReadyz
      responses:
        '200':
          description: 服务就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponseEnvelope'
        '503':
          description: 依赖未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponseEnvelope'
  /api/v1/system/profile:
    get:
      tags: [System]
      summary: 获取当前会话画像
      operationId: getSystemProfile
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
        - $ref: '#/components/parameters/XUserPermissions'
        - $ref: '#/components/parameters/XAcademicBound'
      responses:
        '200':
          description: 当前会话画像
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/auth/wechat/login:
    post:
      tags: [IAM]
      summary: 微信小程序登录
      operationId: postWechatLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeChatLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeChatLoginResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
  /api/auth/admin/login:
    post:
      tags: [IAM]
      summary: 管理员密码登录
      operationId: postAdminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/student:
    get:
      tags: [IAM]
      summary: 获取当前用户资料
      operationId: getCurrentStudent
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 用户资料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfileResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    post:
      tags: [IAM]
      summary: 提交教务绑定
      operationId: bindStudent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindStudentRequest'
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfileResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    put:
      tags: [IAM]
      summary: 解绑教务
      operationId: unbindStudent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentRequest'
      responses:
        '200':
          description: 解绑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/academic/semesters:
    get:
      tags: [Academic]
      summary: 获取当前学生可用学期列表
      operationId: listAcademicSemesters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 学期列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicSemestersResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/academic/schedule:
    get:
      tags: [Academic]
      summary: 获取当前学生课程表
      operationId: getAcademicSchedule
      security:
        - bearerAuth: []
      parameters:
        - name: semester_id
          in: query
          required: false
          schema:
            type: string
          description: 为空时默认返回当前学期课程表
      responses:
        '200':
          description: 课程表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicScheduleResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/academic/exams:
    get:
      tags: [Academic]
      summary: 获取当前学生考试安排
      operationId: listAcademicExams
      security:
        - bearerAuth: []
      parameters:
        - name: semester_id
          in: query
          required: false
          schema:
            type: string
          description: 为空时默认返回当前学期考试安排
      responses:
        '200':
          description: 考试安排
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicExamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/academic/grades:
    get:
      tags: [Academic]
      summary: 获取当前学生成绩单
      operationId: listAcademicGrades
      security:
        - bearerAuth: []
      parameters:
        - name: semester_id
          in: query
          required: false
          schema:
            type: string
          description: 为空时默认返回当前学期成绩单
      responses:
        '200':
          description: 成绩单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicGradesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/upload/cos-sts:
    get:
      tags: [FileCenter]
      summary: 获取腾讯 COS 直传临时凭证
      operationId: getCOSSTS
      security:
        - bearerAuth: []
      parameters:
        - name: scene
          in: query
          required: false
          schema:
            type: string
            enum: [general, market, errand, resource]
          description: 上传场景，用于隔离对象路径前缀
      responses:
        '200':
          description: 临时凭证签发成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSTSCredentialsResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/upload/presigned-get:
    post:
      tags: [FileCenter]
      summary: 按对象路径获取临时下载地址
      operationId: getPresignedGET
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedGetRequest'
      responses:
        '200':
          description: 下载签名成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedGetResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/edu/send-captcha:
    post:
      tags: [IAM]
      summary: 发送教务验证码
      operationId: sendEduCaptcha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCaptchaRequest'
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/portal/home:
    get:
      tags: [Portal]
      summary: 获取门户首页聚合内容
      operationId: getPortalHome
      responses:
        '200':
          description: 门户首页聚合内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
  /api/portal/notices:
    get:
      tags: [Portal]
      summary: 获取公告列表
      operationId: listPortalNotices
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: 公告分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/portal/notices/{id}:
    get:
      tags: [Portal]
      summary: 获取公告详情
      operationId: getPortalNoticeDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 公告详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/admin/portal/notices/publish:
    post:
      tags: [Portal]
      summary: 发布门户公告
      operationId: publishPortalNotice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalNoticePublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/admin/portal/notices/{id}:
    put:
      tags: [Portal]
      summary: 更新门户公告
      operationId: updatePortalNotice
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalNoticePublishRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Portal]
      summary: 删除门户公告
      operationId: deletePortalNotice
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/admin/portal/banners:
    get:
      tags: [Portal]
      summary: 获取管理端轮播列表
      operationId: listPortalBanners
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: 轮播分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
    post:
      tags: [Portal]
      summary: 创建门户轮播
      operationId: createPortalBanner
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalBannerSaveRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/admin/portal/banners/{id}:
    get:
      tags: [Portal]
      summary: 获取管理端轮播详情
      operationId: getPortalBanner
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 轮播详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Portal]
      summary: 更新门户轮播
      operationId: updatePortalBanner
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalBannerSaveRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Portal]
      summary: 删除门户轮播
      operationId: deletePortalBanner
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/notification/list:
    get:
      tags: [Notification]
      summary: 获取当前用户通知列表
      operationId: listNotifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: category
          in: query
          schema:
            type: string
        - name: unread_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: 通知分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/notification/unread-count:
    get:
      tags: [Notification]
      summary: 获取当前用户未读通知数量
      operationId: getNotificationUnreadCount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 未读通知数量
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/notification/read:
    post:
      tags: [Notification]
      summary: 标记通知为已读
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationMarkReadRequest'
      responses:
        '200':
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/admin/notification/publish:
    post:
      tags: [Notification]
      summary: 发布站内通知
      operationId: publishNotification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/admin/analytics/dashboard:
    get:
      tags: [Analytics]
      summary: 获取分析审计看板
      operationId: getAnalyticsDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 分析审计看板
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/admin/analytics/audit-logs:
    get:
      tags: [Analytics]
      summary: 获取审计日志列表
      operationId: listAnalyticsAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: actor_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 审计日志分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/feed/list:
    get:
      tags: [CampusLife]
      summary: 获取首页动态流
      operationId: listFeeds
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/UserRole'
      responses:
        '200':
          description: 动态流分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/market/list:
    get:
      tags: [CampusLife]
      summary: 获取二手列表
      operationId: listMarkets
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Category'
      responses:
        '200':
          description: 二手分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/market/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取二手详情
      operationId: getMarketDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 二手详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDetailResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/market/publish:
    post:
      tags: [CampusLife]
      summary: 发布二手信息
      operationId: publishMarket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/market/favorite:
    post:
      tags: [CampusLife]
      summary: 收藏或取消收藏二手
      operationId: favoriteMarket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteMarketRequest'
      responses:
        '200':
          description: 收藏动作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
