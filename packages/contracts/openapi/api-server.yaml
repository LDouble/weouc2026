components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token
  parameters:
    XUserId:
      name: X-User-ID
      in: header
      required: true
      schema:
        type: string
      description: 当前登录用户标识
    XUserRoles:
      name: X-User-Roles
      in: header
      required: false
      schema:
        type: string
      description: 逗号分隔的角色列表
    XUserPermissions:
      name: X-User-Permissions
      in: header
      required: false
      schema:
        type: string
      description: 逗号分隔的权限码列表
    XAcademicBound:
      name: X-Academic-Bound
      in: header
      required: false
      schema:
        type: boolean
      description: 当前账号是否已完成教务绑定
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    UserRole:
      name: user_role
      in: query
      schema:
        type: string
        enum: [publisher, acceptor, participant, viewer]
    Category:
      name: category
      in: query
      schema:
        type: string
    LostFoundType:
      name: type
      in: query
      schema:
        type: string
        enum: [lost, found]
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequestResponse:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    UnauthorizedResponse:
      description: 未登录或登录状态无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    ForbiddenResponse:
      description: 无权执行当前操作
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    NotFoundResponse:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    ServiceUnavailableResponse:
      description: 依赖服务未启用或暂时不可用
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
  schemas:
    RequestEnvelope:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string
    GenericData:
      type: object
      additionalProperties: true
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [error]
          properties:
            error:
              $ref: '#/components/schemas/ErrorDetail'
    GenericObjectResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/GenericData'
    IDPayload:
      type: object
      required: [id]
      properties:
        id:
          type: string
    IDResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/IDPayload'
    ListPayload:
      type: object
      required: [list, total, page, pageSize]
      properties:
        list:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    ListResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ListPayload'
    HealthStatus:
      type: object
      required: [status, service, version, timestamp]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
    DependencyStatus:
      type: object
      required: [name, status, required]
      properties:
        name:
          type: string
        status:
          type: string
        required:
          type: boolean
        detail:
          type: string
    ReadinessStatus:
      type: object
      required: [status, dependencies, timestamp]
      properties:
        status:
          type: string
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'
        timestamp:
          type: string
          format: date-time
    ProfileService:
      type: object
      required: [name, environment, version]
      properties:
        name:
          type: string
        environment:
          type: string
        version:
          type: string
    ProfileAuth:
      type: object
      required: [authenticated, academic_bound]
      properties:
        authenticated:
          type: boolean
        user_id:
          type: string
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        academic_bound:
          type: boolean
    Profile:
      type: object
      required: [service, auth]
      properties:
        service:
          $ref: '#/components/schemas/ProfileService'
        auth:
          $ref: '#/components/schemas/ProfileAuth'
    HealthResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/HealthStatus'
    ReadinessResponseEnvelope:
      allOf:
