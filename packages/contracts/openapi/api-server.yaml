    CarpoolDetailResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/CarpoolDetail'
    MeetupDetail:
      type: object
      required: [id, title, status, user_role, is_owner, can_view_contact, can_edit, can_delete, can_join, can_cancel_join]
      properties:
        id:
          type: string
          pattern: "^[0-9a-f]{24}$"
          description: MongoDB ObjectID hex string
        category:
          type: string
        title:
          type: string
        desc:
          type: string
        location:
          type: string
        start_at:
          type: string
          format: date-time
        deadline_at:
          type: string
          format: date-time
        max_participants:
          type: integer
        fee_text:
          type: string
        tags:
          type: array
          items:
            type: string
        contact:
          type: string
          description: 联系方式，can_view_contact 为 false 时为空
        status:
          type: string
          enum: [reviewing, published, rejected, offline, cancelled, accepted, open, full, resolved]
        publisher:
          type: string
        publisher_initial:
          type: string
        created_at:
          type: string
          format: date-time
        user_role:
          type: string
          enum: [publisher, participant, viewer]
        is_owner:
          type: boolean
        joined:
          type: boolean
        can_view_contact:
          type: boolean
        can_edit:
          type: boolean
        can_delete:
          type: boolean
          description: 发布者可取消发布（等同于 can_cancel_publish）
        can_join:
          type: boolean
          description: 客态可报名
        can_cancel_join:
          type: boolean
          description: 参与者可取消报名
        can_cancel_publish:
          type: boolean
          description: 兼容旧客户端，等同于 can_delete
    MeetupDetailResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/MeetupDetail'
