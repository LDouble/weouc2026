openapi: 3.1.0
info:
  title: WEOUC API Server Baseline
  version: 0.2.3
  description: 校园综合应用后端当前可联调接口契约，覆盖系统接口、微信小程序主链路、组局/拼车与校园生活审核闭环基础能力。
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: System
    description: 系统级健康检查、就绪检查与会话画像接口
  - name: IAM
    description: 登录、会话、资料与教务绑定接口
  - name: FileCenter
    description: 文件上传临时凭证与对象下载签名接口
  - name: CampusLife
    description: 首页动态、二手、跑腿、资料、失物招领、拼车、组局与审核接口
paths:
  /healthz:
    get:
      tags: [System]
      summary: 存活检查
      operationId: getHealthz
      responses:
        '200':
          description: 服务存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponseEnvelope'
  /readyz:
    get:
      tags: [System]
      summary: 就绪检查
      operationId: getReadyz
      responses:
        '200':
          description: 服务就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponseEnvelope'
        '503':
          description: 依赖未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponseEnvelope'
  /api/v1/system/profile:
    get:
      tags: [System]
      summary: 获取当前会话画像
      operationId: getSystemProfile
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
        - $ref: '#/components/parameters/XUserPermissions'
        - $ref: '#/components/parameters/XAcademicBound'
      responses:
        '200':
          description: 当前会话画像
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/auth/wechat/login:
    post:
      tags: [IAM]
      summary: 微信小程序登录
      operationId: postWechatLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeChatLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeChatLoginResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
  /api/student:
    get:
      tags: [IAM]
      summary: 获取当前用户资料
      operationId: getCurrentStudent
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 用户资料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfileResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    post:
      tags: [IAM]
      summary: 提交教务绑定
      operationId: bindStudent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindStudentRequest'
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfileResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    put:
      tags: [IAM]
      summary: 解绑教务
      operationId: unbindStudent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentRequest'
      responses:
        '200':
          description: 解绑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/upload/cos-sts:
    get:
      tags: [FileCenter]
      summary: 获取腾讯 COS 直传临时凭证
      operationId: getCOSSTS
      security:
        - bearerAuth: []
      parameters:
        - name: scene
          in: query
          required: false
          schema:
            type: string
            enum: [general, market, errand, resource]
          description: 上传场景，用于隔离对象路径前缀
      responses:
        '200':
          description: 临时凭证签发成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSTSCredentialsResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/upload/presigned-get:
    post:
      tags: [FileCenter]
      summary: 按对象路径获取临时下载地址
      operationId: getPresignedGET
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedGetRequest'
      responses:
        '200':
          description: 下载签名成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedGetResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/edu/send-captcha:
    post:
      tags: [IAM]
      summary: 发送教务验证码
      operationId: sendEduCaptcha
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCaptchaRequest'
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/feed/list:
    get:
      tags: [CampusLife]
      summary: 获取首页动态流
      operationId: listFeeds
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/UserRole'
      responses:
        '200':
          description: 动态流分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/market/list:
    get:
      tags: [CampusLife]
      summary: 获取二手列表
      operationId: listMarkets
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Category'
      responses:
        '200':
          description: 二手分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/market/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取二手详情
      operationId: getMarketDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 二手详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/market/publish:
    post:
      tags: [CampusLife]
      summary: 发布二手信息
      operationId: publishMarket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/market/favorite:
    post:
      tags: [CampusLife]
      summary: 收藏或取消收藏二手
      operationId: favoriteMarket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteMarketRequest'
      responses:
        '200':
          description: 收藏动作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/errand/list:
    get:
      tags: [CampusLife]
      summary: 获取跑腿列表
      operationId: listErrands
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Category'
        - $ref: '#/components/parameters/UserRole'
      responses:
        '200':
          description: 跑腿分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/errand/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取跑腿详情
      operationId: getErrandDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 跑腿详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/errand/publish:
    post:
      tags: [CampusLife]
      summary: 发布跑腿信息
      operationId: publishErrand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrandPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/errand/accept:
    post:
      tags: [CampusLife]
      summary: 接单跑腿
      operationId: acceptErrand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrandActionRequest'
      responses:
        '200':
          description: 接单成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/errand/cancel-publish:
    post:
      tags: [CampusLife]
      summary: 取消发布跑腿
      operationId: cancelErrandPublish
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrandActionRequest'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/errand/cancel-accept:
    post:
      tags: [CampusLife]
      summary: 取消接单
      operationId: cancelErrandAccept
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrandActionRequest'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/resource/list:
    get:
      tags: [CampusLife]
      summary: 获取资料列表
      operationId: listResources
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Category'
      responses:
        '200':
          description: 资料分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/resource/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取资料详情
      operationId: getResourceDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 资料详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/resource/publish:
    post:
      tags: [CampusLife]
      summary: 发布资料
      operationId: publishResource
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourcePublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/lostFound/list:
    get:
      tags: [CampusLife]
      summary: 获取失物招领列表
      operationId: listLostFound
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - $ref: '#/components/parameters/Category'
        - $ref: '#/components/parameters/LostFoundType'
      responses:
        '200':
          description: 失物招领分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/lostFound/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取失物招领详情
      operationId: getLostFoundDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 失物招领详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/lostFound/publish:
    post:
      tags: [CampusLife]
      summary: 发布失物招领
      operationId: publishLostFound
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LostFoundPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/carpool/list:
    get:
      tags: [CampusLife]
      summary: 获取拼车列表
      operationId: listCarpools
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: category
          in: query
          schema:
            type: string
            enum: [today, tomorrow, week, longterm]
      responses:
        '200':
          description: 拼车分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/carpool/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取拼车详情
      operationId: getCarpoolDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 拼车详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/carpool/publish:
    post:
      tags: [CampusLife]
      summary: 发布拼车信息
      operationId: publishCarpool
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarpoolPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/meetup/list:
    get:
      tags: [CampusLife]
      summary: 获取组局列表
      operationId: listMeetups
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: category
          in: query
          schema:
            type: string
            enum: [all, study, sports, food, game, activity, other]
        - name: user_role
          in: query
          schema:
            type: string
            enum: [publisher, participant, viewer]
      responses:
        '200':
          description: 组局分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
  /api/meetup/detail/{id}:
    get:
      tags: [CampusLife]
      summary: 获取组局详情
      operationId: getMeetupDetail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: 组局详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/meetup/publish:
    post:
      tags: [CampusLife]
      summary: 发布组局
      operationId: publishMeetup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetupPublishRequest'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/meetup/join:
    post:
      tags: [CampusLife]
      summary: 报名组局
      operationId: joinMeetup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetupActionRequest'
      responses:
        '200':
          description: 报名成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/meetup/cancel-join:
    post:
      tags: [CampusLife]
      summary: 取消组局报名
      operationId: cancelMeetupJoin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetupActionRequest'
      responses:
        '200':
          description: 取消报名成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/meetup/cancel-publish:
    post:
      tags: [CampusLife]
      summary: 取消组局发布
      operationId: cancelMeetupPublish
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetupActionRequest'
      responses:
        '200':
          description: 取消组局成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /api/admin/campus-life/review/list:
    get:
      tags: [CampusLife]
      summary: 获取校园生活审核列表
      operationId: listCampusLifeReviews
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: content_type
          in: query
          schema:
            type: string
            enum: [market, errand, resource, lostFound, carpool, meetup]
        - name: review_status
          in: query
          schema:
            type: string
            enum: [reviewing, published, rejected, offline]
      responses:
        '200':
          description: 审核列表分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/admin/campus-life/review/update:
    post:
      tags: [CampusLife]
      summary: 更新校园生活内容审核状态
      operationId: updateCampusLifeReview
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdateRequest'
      responses:
        '200':
          description: 审核更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObjectResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token
  parameters:
    XUserId:
      name: X-User-ID
      in: header
      required: true
      schema:
        type: string
      description: 当前登录用户标识
    XUserRoles:
      name: X-User-Roles
      in: header
      required: false
      schema:
        type: string
      description: 逗号分隔的角色列表
    XUserPermissions:
      name: X-User-Permissions
      in: header
      required: false
      schema:
        type: string
      description: 逗号分隔的权限码列表
    XAcademicBound:
      name: X-Academic-Bound
      in: header
      required: false
      schema:
        type: boolean
      description: 当前账号是否已完成教务绑定
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    UserRole:
      name: user_role
      in: query
      schema:
        type: string
        enum: [publisher, acceptor, participant, viewer]
    Category:
      name: category
      in: query
      schema:
        type: string
    LostFoundType:
      name: type
      in: query
      schema:
        type: string
        enum: [lost, found]
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequestResponse:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    UnauthorizedResponse:
      description: 未登录或登录状态无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    ForbiddenResponse:
      description: 无权执行当前操作
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    NotFoundResponse:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
    ServiceUnavailableResponse:
      description: 依赖服务未启用或暂时不可用
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEnvelope'
  schemas:
    RequestEnvelope:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string
    GenericData:
      type: object
      additionalProperties: true
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [error]
          properties:
            error:
              $ref: '#/components/schemas/ErrorDetail'
    GenericObjectResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/GenericData'
    IDPayload:
      type: object
      required: [id]
      properties:
        id:
          type: string
    IDResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/IDPayload'
    ListPayload:
      type: object
      required: [list, total, page, pageSize]
      properties:
        list:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    ListResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ListPayload'
    HealthStatus:
      type: object
      required: [status, service, version, timestamp]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
    DependencyStatus:
      type: object
      required: [name, status, required]
      properties:
        name:
          type: string
        status:
          type: string
        required:
          type: boolean
        detail:
          type: string
    ReadinessStatus:
      type: object
      required: [status, dependencies, timestamp]
      properties:
        status:
          type: string
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'
        timestamp:
          type: string
          format: date-time
    ProfileService:
      type: object
      required: [name, environment, version]
      properties:
        name:
          type: string
        environment:
          type: string
        version:
          type: string
    ProfileAuth:
      type: object
      required: [authenticated, academic_bound]
      properties:
        authenticated:
          type: boolean
        user_id:
          type: string
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        academic_bound:
          type: boolean
    Profile:
      type: object
      required: [service, auth]
      properties:
        service:
          $ref: '#/components/schemas/ProfileService'
        auth:
          $ref: '#/components/schemas/ProfileAuth'
    HealthResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/HealthStatus'
    ReadinessResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ReadinessStatus'
    ProfileResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/Profile'
    WeChatLoginRequest:
      type: object
      required: [code, app_id]
      properties:
        code:
          type: string
        app_id:
          type: string
    WeChatUserInfo:
      type: object
      required: [userId, nickname, avatarUrl]
      properties:
        userId:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
    WeChatLoginResponse:
      type: object
      required: [token, openid, userInfo]
      properties:
        token:
          type: string
        openid:
          type: string
        userInfo:
          $ref: '#/components/schemas/WeChatUserInfo'
    WeChatLoginResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/WeChatLoginResponse'
    StudentProfile:
      type: object
      required: [name, avatar_url, student_id, major, college, grade, is_bound, updated_at]
      properties:
        name:
          type: string
        avatar_url:
          type: string
        student_id:
          type: string
        major:
          type: string
        college:
          type: string
        grade:
          type: string
        is_bound:
          type: boolean
        updated_at:
          type: string
          format: date-time
    StudentProfileResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/StudentProfile'
    SendCaptchaRequest:
      type: object
      required: [sid]
      properties:
        sid:
          type: string
    BindStudentRequest:
      type: object
      required: [student_id, password, captcha]
      properties:
        student_id:
          type: string
        password:
          type: string
        captcha:
          type: string
    UpdateStudentRequest:
      type: object
      properties:
        is_bound:
          type: boolean
          enum: [false]
    UploadSTSCredentials:
      type: object
      required:
        - tmp_secret_id
        - tmp_secret_key
        - session_token
        - start_time
        - expired_time
        - bucket
        - region
        - path_prefix
      properties:
        tmp_secret_id:
          type: string
        tmp_secret_key:
          type: string
        session_token:
          type: string
        start_time:
          type: integer
          format: int64
        expired_time:
          type: integer
          format: int64
        bucket:
          type: string
        region:
          type: string
        path_prefix:
          type: string
          description: 允许客户端写入的对象键前缀，业务持久化时应保存完整对象路径
    UploadSTSCredentialsResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/UploadSTSCredentials'
    PresignedGetRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: 已持久化的 COS 对象路径
    PresignedGetResponse:
      type: object
      required: [path, url]
      properties:
        path:
          type: string
        url:
          type: string
    PresignedGetResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/RequestEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/PresignedGetResponse'
    MarketPublishRequest:
      type: object
      required: [title, desc]
      properties:
        title:
          type: string
        desc:
          type: string
        price:
          type: string
        original_price:
          type: string
        category:
          type: string
        condition:
          type: string
        trade_mode:
          type: string
        contact:
          type: string
        images:
          type: array
          description: COS 对象路径列表，不直接持久化临时访问 URL
          items:
            type: string
    FavoriteMarketRequest:
      type: object
      required: [product_id, action]
      properties:
        product_id:
          type: string
        action:
          type: string
          enum: [add, remove]
    ErrandPublishRequest:
      type: object
      required: [title, contact, deadline]
      properties:
        title:
          type: string
        desc:
          type: string
        category:
          type: string
        route_start:
          type: string
        route_end:
          type: string
        deadline:
          type: string
          format: date-time
        reward:
          type: string
        contact:
          type: string
        urgent:
          type: boolean
        images:
          type: array
          description: COS 对象路径列表，不直接持久化临时访问 URL
          items:
            type: string
    ErrandActionRequest:
      type: object
      required: [task_id]
      properties:
        task_id:
          type: string
    ResourcePublishRequest:
      type: object
      required: [title, file_paths]
      properties:
        title:
          type: string
        desc:
          type: string
        category:
          type: string
        course_name:
          type: string
        contact:
          type: string
        file_paths:
          type: array
          description: 资料文件的 COS 对象路径列表
          items:
            type: string
    LostFoundPublishRequest:
      type: object
      required: [title, contact]
      properties:
        type:
          type: string
          enum: [lost, found]
        category:
          type: string
        title:
          type: string
        desc:
          type: string
        location:
          type: string
        event_time:
          type: string
        item_feature:
          type: string
        contact:
          type: string
        reward:
          type: string
    CarpoolPublishRequest:
      type: object
      required: [from, to, travel_date, travel_time, contact]
      properties:
        category:
          type: string
          enum: [today, tomorrow, week, longterm]
        from:
          type: string
        to:
          type: string
        travel_date:
          type: string
          format: date
        travel_time:
          type: string
          description: "HH:mm 格式的本地时间"
        time:
          type: string
          description: 兼容旧客户端的展示时间文本，服务端可忽略
        type:
          type: string
        seats_text:
          type: string
        price:
          type: string
        note:
          type: string
        tags:
          type: array
          items:
            type: string
        contact:
          type: string
    MeetupPublishRequest:
      type: object
      required: [title, location, start_at, max_participants, contact]
      properties:
        category:
          type: string
          enum: [study, sports, food, game, activity, other]
        title:
          type: string
        desc:
          type: string
        location:
          type: string
        start_at:
          type: string
          format: date-time
        deadline_at:
          type: string
          format: date-time
        max_participants:
          type: integer
          minimum: 2
        fee_text:
          type: string
        tags:
          type: array
          items:
            type: string
        contact:
          type: string
    MeetupActionRequest:
      type: object
      required: [meetup_id]
      properties:
        meetup_id:
          type: string
    ReviewUpdateRequest:
      type: object
      required: [content_type, content_id, review_status]
      properties:
        content_type:
          type: string
          enum: [market, errand, resource, lostFound, carpool, meetup]
        content_id:
          type: string
        review_status:
          type: string
          enum: [reviewing, published, rejected, offline]
